<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信安暖驿-个人空间</title>
    <!-- 引用公共CSS文件 -->
    <link rel="stylesheet" href="css/common_styles.css">
    <!-- 引用外部CSS文件 -->
    <link rel="stylesheet" href="css/myspace_styles.css">
    <!-- 添加Font Awesome图标库 -->
    <link rel="stylesheet" href="assets/font-awesome/css/all.min.css">
</head>

<body>
    <nav class="navbar">
        <a href="1 me.html" class="nav-btn">🏠 网站首页</a>
        <a href="5 welcome.html" class="nav-btn">📷 互助论坛</a>
        <a href="3 writing.html" class="nav-btn">✨ 帖子上传</a>
        <a href="13 myspace.html" class="nav-btn">👤 个人主页</a>
        <a href="4 login.html" class="nav-btn">🔑 重新登录</a>
    </nav>
    
    <!-- 个人信息部分 -->
    <div class="profile">
        <img class="avatar" src="" alt="头像" />
        <h1 class="text-4xl font-bold mt-4">加载中...</h1>
        <p class="text-gray-600 mt-2">加载个人简介中...</p>
        <p id="current-level-info">加载等级信息中...</p>
    </div>

    <!-- 添加成就和收藏按钮 -->
    <div class="action-buttons">
        <a href="14 achievement.html" class="audit-btn">🎖️ 成就</a>
        <a href="15 collection.html" class="audit-btn">⭐ 收藏</a>
        <button id="edit-profile-btn" class="audit-btn">🛠️ 完善资料</button>
    </div>
    
    <!-- 动态部分 -->
    <div class="posts">
        <h2 class="text-2xl font-bold mb-4">我的帖子</h2>
        <!-- 帖子列表将通过JavaScript动态生成 -->
        <div class="loading-placeholder">加载帖子中...</div>
    </div>

    <!-- 关注列表部分 -->
    <div class="following">
        <h2 class="text-2xl font-bold mb-4">我关注的人</h2>
        <div id="following-list" class="following-list">
            <!-- 关注列表将通过JavaScript动态生成 -->
            <div class="following-placeholder">加载关注列表中...</div>
        </div>
    </div> 
    <script src="js/myspace_script.js?v=1.3" type="module"></script>
    <!-- 个人信息完善弹窗 -->
    <div id="editProfileModal" class="modal" style="display:none;">
        <div class="modal-content">
            <h2>我的信息</h2>
            <form id="editProfileForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="ep-nickname">昵称</label>
                        <input type="text" id="ep-nickname" disabled>
                    </div>
                    <div class="form-group gender-row">
                        <label>性别</label>
                        <div class="radio-group" id="ep-gender-group">
                            <label><input type="radio" name="ep-gender" value="男"> 男</label>
                            <label><input type="radio" name="ep-gender" value="女"> 女</label>
                            <label><input type="radio" name="ep-gender" value="保密"> 保密</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="ep-birthday">出生日期</label>
                        <input type="date" id="ep-birthday">
                    </div>
                    <div class="form-group">
                        <label for="ep-email">电子邮箱</label>
                        <input type="email" id="ep-email" placeholder="请输入电子邮箱">
                    </div>
                    <div class="form-group">
                        <label for="ep-phone">电话号码</label>
                        <input type="tel" id="ep-phone" placeholder="请输入电话号码">
                    </div>
                    <div class="form-group">
                        <label for="ep-avatar">头像URL</label>
                        <input type="url" id="ep-avatar" placeholder="https://...">
                    </div>
                    <div class="form-group full-row">
                        <label for="ep-bio">我的签名</label>
                        <textarea id="ep-bio" rows="3" placeholder="设置您的签名"></textarea>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="ep-cancel">取消</button>
                    <button type="submit" class="btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>
    <script>
        // 页面加载完成后初始化页面数据
        document.addEventListener('DOMContentLoaded', function() {
            // 调用初始化函数加载实际用户数据
            if (typeof initPage === 'function') {
                initPage();
            } else {
                console.error('初始化函数未找到，请检查myspace_script.js文件');
            }
        });
    </script>
</body>

</html>
