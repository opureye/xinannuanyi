<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信安暖驿-帖子分类</title>
    <!-- 外部资源引入 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="assets/font-awesome/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Playfair+Display:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- 引用公共CSS文件 -->
    <link rel="stylesheet" href="css/common_styles.css">
    <!-- 引入外部CSS文件 -->
    <link rel="stylesheet" href="css/post_category_styles.css">
    <!-- 添加sdk_utils.js引用 -->
    <script type="module" src="js/sdk_utils.js"></script>
    <!-- 添加api.js引用 -->
    <script type="module" src="js/api.js"></script>
    <!-- 添加post_category_script.js引用 -->
    <script type="module" src="js/post_category_script.js"></script>
</head>

<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="1 me.html" class="nav-btn">🏠 网站首页</a>
        <a href="5 welcome.html" class="nav-btn">📷 互助论坛</a>
        <a href="3 writing.html" class="nav-btn">✨ 帖子上传</a>
        <a href="13 myspace.html" class="nav-btn">👤 个人主页</a>
    </nav>

    <!-- 主内容区域 -->
    <div class="container mx-auto p-8 pt-20">
        <div class="category-card flex flex-col items-center text-center">
            <i class="fa-solid fa-folder-open text-5xl text-green-500 mb-4"></i>
            <h1 class="text-3xl font-bold text-gray-800 mb-4">帖子分类（按不同疾病）</h1>
            <p class="text-gray-600 mb-8">这里按不同疾病分类展示帖子。</p>
            
            <!-- 搜索框 -->
            <div class="search-bar mb-8 w-full max-w-md">
                <input 
                    type="text" 
                    id="category-search-input"
                    placeholder="输入关键词快速搜索相关疾病帖子..." 
                    class="search-input w-full p-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-green-500"
                >
                <button id="search-button" class="search-button bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-600 transition-colors">
                    <i class="fas fa-search"></i> 搜索
                </button>
            </div>
            
            <!-- 当前分类显示 -->
            <div id="current-category" class="mb-6 hidden">
                <span class="text-lg font-medium text-gray-700">当前分类：</span>
                <span id="category-name" class="text-lg font-semibold text-green-600">全部</span>
            </div>
            
            <ul class="category-list">
                <li><a href="#" data-category="内科">内科</a></li>
                <li><a href="#" data-category="外科">外科</a></li>
                <li><a href="#" data-category="心理科">心理科</a></li>
                <li><a href="#" data-category="皮肤科">皮肤科</a></li>
                <li><a href="#" data-category="妇产科">妇产科</a></li>
                <li><a href="#" data-category="儿科">儿科</a></li>
                <li><a href="#" data-category="神经科">神经科</a></li>
                <li><a href="#" data-category="中医科">中医科</a></li>
                <li><a href="#" data-category="肿瘤科">肿瘤科</a></li>
                <li><a href="#" data-category="全部">全部帖子</a></li>
            </ul>
        </div>
        
        <!-- 搜索结果区域 -->
        <div id="search-results" class="mt-12">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">搜索结果</h2>
            <div id="results-list" class="space-y-4">
                <!-- 搜索结果将在这里动态显示 -->
                <p class="text-gray-500">请选择分类或输入关键词进行搜索</p>
            </div>
        </div>
    </div>
    <!-- 引入外部JavaScript文件 -->
    <script type="module" src="js/ux_enhance.js"></script>
    
    <!-- 以模块方式加载AI侧边栏脚本 -->
    <script type="module" src="./js/ai_sidebar.js"></script>
</body>

</html>
