<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>信安暖驿-评论审核</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="assets/font-awesome/css/all.min.css" rel="stylesheet">
    <!-- 引用公共CSS文件 -->
    <link rel="stylesheet" href="css/common_styles.css">
    <!-- 引入外部CSS文件 -->
    <link rel="stylesheet" href="css/comment_audit_styles.css">
    <!-- 添加sdk_utils.js引用 -->
    <script type="module" src="js/sdk_utils.js"></script>
</head>

<body>
    <header class="bg-white shadow-md py-4">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-800">审核系统</h1>
            <nav class="navbar">
                <a href="1 me.html" class="nav-btn">🏠 网站首页</a>
                <a href="5 welcome.html" class="nav-btn">📷 互助论坛</a>
                <a href="3 writing.html" class="nav-btn">✨ 帖子上传</a>
                <a href="13 myspace.html" class="nav-btn">👤 个人主页</a>
                <a href="4 login.html" class="nav-btn">🔑 重新登录</a>
            </nav>
        </div>
    </header>
    
    <a href="9 audit_home.html" class="nav-btn" style="position: fixed; top: 20px; left: 20px;">← 返回</a>
    
    <main class="container mx-auto p-8 animate-fadeIn">
        <h2 class="text-4xl font-bold text-gray-800 mb-4">评论审核</h2>
        <p class="text-gray-600 mb-8">审查用户发表的评论内容，维护良好的交流环境。</p>
        
        <div class="comment-container">
            <h3 class="text-2xl font-bold text-gray-800 mb-4">待审核评论列表</h3>
            <div class="space-y-4">
                <!-- 评论将通过JavaScript动态加载 -->
                <div class="text-center py-8">
                    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
                    <p class="text-gray-500">正在加载待审核评论...</p>
                </div>
            </div>
        </div>
    </main>
    
    <!-- 添加comment_audit_script.js引用 -->
    <script src="js/comment_audit_script.js"></script>
    <!-- 添加AI侧边栏模块 -->
    <script src="./js/ai_sidebar.js" type="module"></script>
