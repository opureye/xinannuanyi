<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>信安暖驿-帖子上传</title>
    <!-- 引用公共CSS文件 -->
    <link rel="stylesheet" href="css/common_styles.css">
    <!-- 引用外部CSS文件 -->
    <link rel="stylesheet" href="css/writing_styles.css">
    <!-- 添加sdk_utils.js引用 -->
    <script type="module" src="js/sdk_utils.js"></script>
</head>
<body>
    <!-- 在每个页面的<body>开头添加导航栏 -->
    <nav class="navbar">
        <a href="1 me.html" class="nav-btn">🏠 网站首页</a>
        <a href="5 welcome.html" class="nav-btn">📷 互助论坛</a>
        <a href="3 writing.html" class="nav-btn">✨ 帖子上传</a>
        <a href="13 myspace.html" class="nav-btn">👤 个人主页</a>
        <a href="4 login.html" class="nav-btn">🔑 重新登录</a>
    </nav>

    <div class="container">
        <h1>✨ 帖子上传</h1>
        
        <form id="messageForm">
            <input type="text" id="name" placeholder="文章标题" required>
            <!-- 添加分类选择 -->
            <select id="category" required>
                <option value="">请选择帖子分类</option>
                <option value="外科">外科</option>
                <option value="内科">内科</option>
                <option value="皮肤科">皮肤科</option>
                <option value="妇产科">妇产科</option>
                <option value="儿科">儿科</option>
                <option value="神经科">神经科</option>
                <option value="中医科">中医科</option>
                <option value="肿瘤科">肿瘤科</option>
                <option value="心理科">心理科</option>
                <option value="其他">其他</option>
            </select>
            <textarea id="content" rows="5" placeholder="写下你想要帮助别人的内容..." required></textarea>
            <button type="submit">🚀 发布</button>
        </form>

        <div id="messages"></div>
    </div>
    <!-- 加载非AI相关脚本 -->
    <script type="module" src="./js/writing_script.js?v=1.1"></script>
    
    <!-- 以模块方式加载AI侧边栏脚本 -->
    <script type="module" src="./js/ai_sidebar.js"></script>
    <script type="module" src="./js/ux_enhance.js"></script>
</body>
</html>
