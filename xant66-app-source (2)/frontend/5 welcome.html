    <!-- 引用公共CSS文件 -->
    <link rel="stylesheet" href="css/common_styles.css">
    <link rel="stylesheet" href="assets/font-awesome/css/all.min.css">
    <!-- 引用外部CSS文件 -->
    <link rel="stylesheet" href="css/welcome_styles.css">
    
    <!-- 保留基础脚本，移除AI相关脚本 -->
    <script type="module" src="js/sdk_utils.js"></script>

<body>
<!-- 保留一个导航栏 -->
<nav class="navbar">
    <a href="1 me.html" class="nav-btn">🏠 网站首页</a>
    <a href="5 welcome.html" class="nav-btn" aria-current="page">📷 互助论坛</a>

  <div class="container">
        <h1 class="page-title">
           互助论坛
        </h1>
        <!-- 添加到帖子分类页面的跳转按钮 -->
        <div class="category-link-container mt-4 mb-6">

                id="searchInput"
            >
        </div>
        <div class="forum-toolbar">

                </select>
                <button type="button" id="clearSearchBtn" class="btn clear-btn">清空搜索</button>
            </div>
        </div>
        <div class="article-list" aria-live="polite">
            <div class="loading">正在加载文章列表...</div>
        </div>

    <!-- 加载非AI相关脚本 -->
