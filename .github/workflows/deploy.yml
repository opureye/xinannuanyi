name: 自动部署 Docker 项目
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 连接服务器自动更新
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /root/xinannuanyi
            git pull origin main
            docker-compose down
            docker-compose up -d --build
            docker image prune -f
